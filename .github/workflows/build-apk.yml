name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build APK
        run: |
          mkdir -p app/build
          cp -r Dashboard-Editor--main/* app/build/
          cd app
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          npx cap init DashboardEditor io.ionic.DashboardEditor --web-dir build
          npx cap add android
          mkdir -p assets/icons
          cp ../Dashboard-Editor--main/icon.png assets/icons/icon.png
          npx capacitor-assets generate --android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: Dashboard-APK
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
